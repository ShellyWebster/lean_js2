<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
</head>
<body>
    <h1>Belajar Table</h1>
    <table style="border: 1px solid rgb(105, 14, 133);">
        <colgroup>
            <col span="2" style="background-color: rgb(255, 0, 0);">
            <col style="background-color: aqua;">
        </colgroup>
        <thead>
            <tr>
                <th>No</th>
                <th>Nama</th>
                <th>Kota</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td>Rizky</td>
                <td>Bandung</td>
            </tr>
            <tr>
                <td>2</td>
                <td>Rizky 2</td>
                <td>Bandung 2</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td colspan="3">Jumlah 2 Data</td>
            </tr>
        </tfoot>
    </table>
</body>
</html>
