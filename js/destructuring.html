<html>
    <body>
        Destructuring array ,
        <script>
            const names = ["Juju", "Supardi", "Nasir", "Sigarantang"];

            // const [firstName, middleName, lastName, ...others] = names;
            //dogamti let biar ga error 
            {
                let [firstName, middleName, lastName, ...others] = names;

            console.info(firstName);
            console.info(middleName);
            console.info(lastName);
            console.info(others);
            }

            const person = {
                name: "Eko",
                age: 30,
                address: {
                    city: "Jakarta",
                    country: "Indonesia"
                },
                hobby: ["Coding", "Reading", "Gaming"],
                channel: "Eko Kurniawan",
            };

            let { name, hobby, address: {city, street, country}, ...others } = person;
            console.info(name);
            console.info(hobby);
            // console.info(address);
            console.info(city);
            console.info(country);

            //destructuring function 
            // function sum(array) {
            //     return array[0] + array[1];
            // }
            function sum([first, second]) {
                return first + second;
            }

            console.info(sum([5, 10]));

            {
                const {
                    firstName: namaDepan,
                    middleName: namaTengah = "Kurniawan",
                    lastName: namaBelakang
                } = person;

                console.info(namaDepan);
                console.info(namaTengah);
                console.info(namaBelakang);
            }

        </script>
    </body>
</html>
