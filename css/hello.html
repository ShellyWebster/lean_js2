<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello</title>
    <style>
        h1, h2, h3, .merah, #title { 
            color: red;
            font-size: 28px;
            text-align: center;
            margin-top: 50px;
        }
        #judul {
            color: green;
            font-size: 24px;
            text-align: right;
            margin-top: 10px;
        }
        .blue-text {
            color: rgb(87, 87, 156);
        }
        .upper {
            text-transform: uppercase;
        }
        .lower {
            text-transform: lowercase;
        }
    </style>
</head>
<body>
    <h1>Hello, World! hahaha</h1>
    <h2>Welcome to CSS styling!</h2>
    <h3 id="judul">This is a heading with an ID</h3>
 
    <h4 class="blue-text upper">This is a heading with a class</h4>   
    <p class="blue-text">This is a paragraph with a class</p>
    
    <p class="merah">THIS IS A PARAGRAPH WITH LOWERCASE TRANSFORM.</p>

</body>
</html>
</body>
</html>
