<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Fields</title>
</head>
<body>
    <script>
        class Counter {
            #counter = 0;

            increment() {
                this.#counter++;
            }

            decrement() {
                this.#counter--;
            }

            get() {
                return this.#counter;
            }
        }

        const counter = new Counter();
        counter.counter = 300;

        console.info(counter.get());
        counter.increment();
        counter.increment();
        console.info(counter.get());
        counter.decrement();
        console.info(counter.get());
        

    </script>
</body>
</html>
