<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inheritance</title>
</head>
<body>
    <script>
        class Employee {
            sayHello(name) {
                console.info(`Hi, ${name}, my name is ${this.name}`);
            }
        }

        class Manager extends Employee {
            sayHello(name) {
                console.info(`Hi, ${name}, my name is ${this.name}, I'm a manager`);    
            }
        }

        const eko = new Employee();
        eko.name = "Eko";
        console.info(eko);
        eko.sayHello("Budi");

        const budi = new Manager();
        budi.name = "Budi";
        console.info(budi);
        budi.sayHello("Eko");

    </script>
</body>
</html>
