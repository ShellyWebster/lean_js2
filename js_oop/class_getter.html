<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Getter SEtter class</title>
</head>
<body>
    <script>
        class Person {
            constructor(firstName, lastName) {
                this.firstName = firstName;
                this.lastName = lastName;
            }

            get fullName() {
                return `${this.firstName} ${this.lastName}`;
            }

            set fullName(value) {
                const result = value.split(" ");
                this.firstName = result[0];
                this.lastName = result[1];
            }
        }

        const jajang = new Person("Jajang", "Nurjaman");
        console.info(jajang);

        console.info(jajang.fullName);

        jajang.fullName = "Okan Buruk"

        console.info(jajang);

        // console.info(jajang.fullName("Eko Nugroho"));
    </script>
</body>
</html>
