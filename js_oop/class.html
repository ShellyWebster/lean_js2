<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        class Person {
            constructor(name) {
                this.name = name;
            }

            //method 
            sayHello(name) {
                console.info(`Hi ${name}, my name is ${this.name}`);
                // return `Hello ${name}, my name is ${this.name}`;
            }
        }

        const eko = new Person("Eko");
        console.info(eko);
        eko.sayHello("Budi");
        
        const budi = new Person("Budi");
        console.info(budi);
        budi.sayHello("Eko");

    </script>
</body>
</html>
